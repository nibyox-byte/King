kind = "web"
previewPath = "/"
title = "Gorilla Guardians"
version = "1.0.0"
id = "artifacts/gorilla-guardians"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24775

[services.development]
run = "pnpm --filter @workspace/gorilla-guardians run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/gorilla-guardians", "run", "build" ]
publicDir = "artifacts/gorilla-guardians/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24775"
BASE_PATH = "/"
