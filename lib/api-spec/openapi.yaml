        id:
          type: integer
        title:
          type: string
        slug:
          type: string
        description:
          type: string
        type:
          type: string
          enum: [guided_tour, homestay, workshop, dance_lesson, cooking_class]
        images:
          type: array
          items:
            type: string
        videoUrl:
          type: ["string", "null"]
        price:
          type: number
        duration:
          type: string
        capacity:
          type: integer
        difficultyLevel:
          type: ["string", "null"]
        includedItems:
          type: array
          items:
            type: string
        meetingPoint:
          type: ["string", "null"]
        cancellationPolicy:
          type: ["string", "null"]
        active:
          type: boolean
        averageRating:
          type: ["number", "null"]
        reviewCount:
          type: integer
        createdAt:
          type: string
          format: date-time
      required: [id, title, slug, description, type, images, price, duration, capacity, includedItems, active, reviewCount, createdAt]

    ExperienceListResponse:
      type: object
      properties:
        experiences:
          type: array
          items:
            $ref: "#/components/schemas/Experience"
        total:
          type: integer
        page:
          type: integer
        totalPages:
          type: integer
      required: [experiences, total, page, totalPages]

    ExperienceInput:
      type: object
      required: [title, description, type, price, duration, capacity]
      properties:
        title:
          type: string
        description:
          type: string
        type:
          type: string
        images:
          type: array
          items:
            type: string
        videoUrl:
          type: string
        price:
          type: number
        duration:
          type: string
        capacity:
          type: integer
        difficultyLevel:
          type: string
        includedItems:
          type: array
          items:
            type: string
        meetingPoint:
          type: string
        cancellationPolicy:
          type: string
        active:
          type: boolean

    ExperienceUpdate:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        price:
          type: number
        duration:
          type: string
        capacity:
          type: integer
        images:
          type: array
          items:
            type: string
        includedItems:
          type: array
          items:
            type: string
        active:
          type: boolean

    # BOOKING
    Booking:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        experienceId:
          type: integer
        date:
          type: string
          format: date
        participants:
          type: integer
        totalAmount:
          type: number
        status:
          type: string
          enum: [pending, confirmed, cancelled, completed]
        paymentStatus:
          type: string
          enum: [pending, paid, refunded]
        specialRequests:
          type: ["string", "null"]
        experience:
          $ref: "#/components/schemas/Experience"
        createdAt:
          type: string
          format: date-time
      required: [id, userId, experienceId, date, participants, totalAmount, status, paymentStatus, createdAt]

    BookingInput:
      type: object
      required: [experienceId, date, participants]
      properties:
        experienceId:
          type: integer
        date:
          type: string
          format: date
        participants:
          type: integer
        specialRequests:
          type: string
        paymentMethod:
          type: string

    BookingUpdate:
      type: object
      properties:
        status:
          type: string
        paymentStatus:
          type: string

    # ORDER
    Order:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"
        subtotal:
          type: number
        shippingCost:
          type: number
        total:
          type: number
        status:
          type: string
          enum: [pending, confirmed, packed, shipped, out_for_delivery, delivered, cancelled, refunded]
        paymentMethod:
          type: string
        paymentStatus:
          type: string
          enum: [pending, paid, refunded]
        shippingAddress:
          type: string
        shippingType:
          type: string
          enum: [global, pickup]
        shippingCarrier:
          type: ["string", "null"]
        trackingNumber:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
      required: [id, userId, items, subtotal, shippingCost, total, status, paymentMethod, paymentStatus, shippingAddress, shippingType, createdAt]

    OrderItem:
      type: object
      properties:
        id:
          type: integer
        productId:
          type: integer
        productName:
          type: string
        productImage:
          type: string
        quantity:
          type: integer
        price:
          type: number
        subtotal:
          type: number
      required: [id, productId, productName, productImage, quantity, price, subtotal]

    OrderListResponse:
      type: object
      properties:
        orders:
          type: array
          items:
            $ref: "#/components/schemas/Order"
        total:
          type: integer
        page:
          type: integer
        totalPages:
          type: integer
      required: [orders, total, page, totalPages]

    OrderInput:
      type: object
      required: [items, shippingAddress, shippingType, paymentMethod]
      properties:
        items:
          type: array
          items:
            type: object
            properties:
              productId:
                type: integer
              quantity:
                type: integer
            required: [productId, quantity]
        shippingAddress:
          type: string
        shippingType:
          type: string
          enum: [global, pickup]
        paymentMethod:
          type: string
        notes:
          type: string

    OrderUpdate:
      type: object
      properties:
        status:
          type: string
        paymentStatus:
          type: string
        trackingNumber:
          type: string
        shippingCarrier:
          type: string
        notes:
          type: string

    # DELIVERY TRACKING
    DeliveryTracking:
      type: object
      properties:
        id:
          type: integer
        orderId:
          type: integer
        status:
          type: string
        trackingNumber:
          type: ["string", "null"]
        carrier:
          type: ["string", "null"]
        estimatedDelivery:
          type: ["string", "null"]
          format: date
        timeline:
          type: array
          items:
            $ref: "#/components/schemas/TrackingEvent"
        currentLocation:
          type: ["string", "null"]
        updatedAt:
          type: string
          format: date-time
      required: [id, orderId, status, timeline, updatedAt]

    TrackingEvent:
      type: object
      properties:
        status:
          type: string
        description:
          type: string
        location:
          type: ["string", "null"]
        timestamp:
          type: string
          format: date-time
      required: [status, description, timestamp]

    DeliveryTrackingUpdate:
      type: object
      properties:
        status:
          type: string
        trackingNumber:
          type: string
        carrier:
          type: string
        estimatedDelivery:
          type: string
        currentLocation:
          type: string
        description:
          type: string

    # REVIEW
    Review:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        productId:
          type: ["integer", "null"]
        experienceId:
          type: ["integer", "null"]
        rating:
          type: integer
          minimum: 1
          maximum: 5
        title:
          type: ["string", "null"]
        comment:
          type: string
        images:
          type: array
          items:
            type: string
        isVerifiedPurchase:
          type: boolean
        status:
          type: string
          enum: [pending, approved, rejected]
        user:
          $ref: "#/components/schemas/User"
        createdAt:
          type: string
          format: date-time
      required: [id, userId, rating, comment, images, isVerifiedPurchase, status, createdAt]

    ReviewInput:
      type: object
      required: [rating, comment]
      properties:
        productId:
          type: integer
        experienceId:
          type: integer
        rating:
          type: integer
          minimum: 1
          maximum: 5
        title:
          type: string
        comment:
          type: string
        images:
          type: array
          items:
            type: string

    ReviewUpdate:
      type: object
      properties:
        status:
          type: string
          enum: [pending, approved, rejected]

    # NOTIFICATION
    Notification:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        type:
          type: string
        title:
          type: string
        message:
          type: string
        isRead:
          type: boolean
        link:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
      required: [id, userId, type, title, message, isRead, createdAt]

    # CONVERSATION / MESSAGE
    Conversation:
      type: object
      properties:
        id:
          type: integer
        participants:
          type: array
          items:
            $ref: "#/components/schemas/User"
        lastMessage:
          type: ["string", "null"]
        unreadCount:
          type: integer
        updatedAt:
          type: string
          format: date-time
      required: [id, participants, unreadCount, updatedAt]

    ConversationInput:
      type: object
      required: [participantId]
      properties:
        participantId:
          type: integer

    Message:
      type: object
      properties:
        id:
          type: integer
        conversationId:
          type: integer
        senderId:
          type: integer
        content:
          type: string
        fileUrl:
          type: ["string", "null"]
        isRead:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required: [id, conversationId, senderId, content, isRead, createdAt]

    MessageInput:
      type: object
      required: [conversationId, content]
      properties:
        conversationId:
          type: integer
        content:
          type: string
        fileUrl:
          type: string

    # FEEDBACK
    Feedback:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: ["integer", "null"]
        type:
          type: string
          enum: [suggestion, issue, general]
        subject:
          type: string
        message:
          type: string
        rating:
          type: ["integer", "null"]
        status:
          type: string
          enum: [open, in_progress, resolved]
        adminResponse:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
      required: [id, type, subject, message, status, createdAt]

    FeedbackInput:
      type: object
      required: [type, subject, message]
      properties:
        type:
          type: string
          enum: [suggestion, issue, general]
        subject:
          type: string
        message:
          type: string
        rating:
          type: integer
          minimum: 1
          maximum: 5

    FeedbackUpdate:
      type: object
      properties:
        status:
          type: string
          enum: [open, in_progress, resolved]
        adminResponse:
          type: string

    # EVENT
    Event:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        slug:
          type: string
        description:
          type: string
        type:
          type: string
        image:
          type: ["string", "null"]
        startDate:
          type: string
          format: date-time
        endDate:
          type: ["string", "null"]
          format: date-time
        location:
          type: ["string", "null"]
        isOnline:
          type: boolean
        active:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required: [id, title, slug, description, type, startDate, isOnline, active, createdAt]

    EventInput:
      type: object
      required: [title, description, type, startDate]
      properties:
        title:
          type: string
        description:
          type: string
        type:
          type: string
        image:
          type: string
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
        location:
          type: string
        isOnline:
          type: boolean
        active:
          type: boolean

    EventUpdate:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        image:
          type: string
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
        location:
          type: string
        active:
          type: boolean

    # STORY
    Story:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        slug:
          type: string
        excerpt:
          type: string
        content:
          type: string
        type:
          type: string
          enum: [article, gallery, video, conservation, transformation]
        coverImage:
          type: ["string", "null"]
        images:
          type: array
          items:
            type: string
        videoUrl:
          type: ["string", "null"]
        artisanId:
          type: ["integer", "null"]
        tags:
          type: array
          items:
            type: string
        published:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required: [id, title, slug, excerpt, content, type, images, tags, published, createdAt]

    StoryInput:
      type: object
      required: [title, excerpt, content, type]
      properties:
        title:
          type: string
        excerpt:
          type: string
        content:
          type: string
        type:
          type: string
        coverImage:
          type: string
        images:
          type: array
          items:
            type: string
        videoUrl:
          type: string
        artisanId:
          type: integer
        tags:
          type: array
          items:
            type: string
        published:
          type: boolean

    # IMPACT
    ImpactStats:
      type: object
      properties:
        familiesSupported:
          type: integer
        schoolFeesFunded:
          type: integer
        treesProtected:
          type: integer
        communityIncomeGenerated:
          type: number
        artisansEmpowered:
          type: integer
        conservationAmbassadors:
          type: integer
        countriesReached:
          type: integer
        totalOrders:
          type: integer
        totalDonations:
          type: number
      required: [familiesSupported, schoolFeesFunded, treesProtected, communityIncomeGenerated, artisansEmpowered, conservationAmbassadors, countriesReached, totalOrders, totalDonations]

    # WISHLIST
    WishlistItem:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        productId:
          type: integer
        product:
          $ref: "#/components/schemas/Product"
        createdAt:
          type: string
          format: date-time
      required: [id, userId, productId, createdAt]

    WishlistItemInput:
      type: object
      required: [productId]
      properties:
        productId:
          type: integer

    # CART
    Cart:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/CartItem"
        subtotal:
          type: number
        itemCount:
          type: integer
      required: [items, subtotal, itemCount]

    CartItem:
      type: object
      properties:
        productId:
          type: integer
        product:
          $ref: "#/components/schemas/Product"
        quantity:
          type: integer
        subtotal:
          type: number
      required: [productId, quantity, subtotal]

    CartItemInput:
      type: object
      required: [productId, quantity]
      properties:
        productId:
          type: integer
        quantity:
          type: integer

    CartItemUpdate:
      type: object
      required: [quantity]
      properties:
        quantity:
          type: integer

    # ANALYTICS
    DashboardStats:
      type: object
      properties:
        totalRevenue:
          type: number
        totalOrders:
          type: integer
        totalCustomers:
          type: integer
        totalProducts:
          type: integer
        totalBookings:
          type: integer
        pendingOrders:
          type: integer
        lowStockProducts:
          type: integer
        newCustomersThisMonth:
          type: integer
        revenueThisMonth:
          type: number
        conversionRate:
          type: number
      required: [totalRevenue, totalOrders, totalCustomers, totalProducts, totalBookings, pendingOrders, lowStockProducts, newCustomersThisMonth, revenueThisMonth, conversionRate]

    SalesDataPoint:
      type: object
      properties:
        date:
          type: string
        revenue:
          type: number
        orders:
          type: integer
        bookings:
          type: integer
      required: [date, revenue, orders, bookings]

    TopProduct:
      type: object
      properties:
        productId:
          type: integer
        name:
          type: string
        image:
          type: string
        totalSold:
          type: integer
        revenue:
          type: number
        artisanName:
          type: string
      required: [productId, name, image, totalSold, revenue, artisanName]

    TopExperience:
      type: object
      properties:
        experienceId:
          type: integer
        title:
          type: string
        type:
          type: string
        totalBookings:
          type: integer
        revenue:
          type: number
        averageRating:
          type: ["number", "null"]
      required: [experienceId, title, type, totalBookings, revenue]

    # DONATION
    Donation:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        artisanId:
          type: integer
        amount:
          type: number
        message:
          type: ["string", "null"]
        artisan:
          $ref: "#/components/schemas/Artisan"
        createdAt:
          type: string
          format: date-time
      required: [id, userId, artisanId, amount, createdAt]

    DonationInput:
      type: object
      required: [artisanId, amount]
      properties:
        artisanId:
          type: integer
        amount:
          type: number
        message:
          type: string
        paymentMethod:
          type: string
