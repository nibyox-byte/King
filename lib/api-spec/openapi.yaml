    ArtisanInput:
      type: object
      required: [userId, name]
      properties:
        userId:
          type: integer
        name:
          type: string
        photo:
          type: string
        biography:
          type: string
        skills:
          type: array
          items:
            type: string
        story:
          type: string
        galleryImages:
          type: array
          items:
            type: string
        videoUrl:
          type: string
        isConservationAmbassador:
          type: boolean

    ArtisanUpdate:
      type: object
      properties:
        name:
          type: string
        photo:
          type: string
        biography:
          type: string
        skills:
          type: array
          items:
            type: string
        story:
          type: string
        galleryImages:
          type: array
          items:
            type: string
        videoUrl:
          type: string
        isConservationAmbassador:
          type: boolean

    # EXPERIENCE
    Experience:
      type: object
